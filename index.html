<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sands of Apocalypse</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 3D canvas host -->
  <div id="game-root">
    <canvas id="game-canvas"></canvas>
    <div id="vignette"></div>
    <div id="hitsplat-layer"></div>
    <div id="label-layer"></div>
  </div>

  <!-- Loading / boot screen -->
  <div id="boot">
    <div class="boot-inner">
      <div class="boot-title">SANDS OF APOCALYPSE</div>
      <div class="boot-sub">the canyon of sands &mdash; entering&hellip;</div>
      <div id="boot-status">crossing the dunes&hellip;</div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <!-- Top-right: health globe -->
    <div id="vitals">
      <div class="globe" id="hp-globe">
        <div class="globe-fill" id="hp-fill"></div>
        <div class="globe-num" id="hp-num">10</div>
        <div class="globe-label">HP</div>
      </div>
    </div>

    <!-- Top-right, under HP: gold purse -->
    <div id="gold-counter"><span class="coin">🪙</span> <span id="gold-num">0</span></div>

    <!-- Bottom-right: toggleable tab panels (only one open at a time) -->
    <div id="side-panels">
      <div id="skills-panel" class="side-panel" data-tab="skills">
        <div class="panel-header">SKILLS</div>
        <div id="skills-list"></div>
      </div>

      <div id="inventory-panel" class="side-panel" data-tab="inventory">
        <div class="panel-header">INVENTORY <span id="inv-count">0/28</span></div>
        <div id="inventory-grid"></div>
      </div>

      <div id="equipment-panel" class="side-panel" data-tab="equipment">
        <div class="panel-header">EQUIPMENT</div>
        <div id="equipment-grid"></div>
      </div>
    </div>

    <!-- Bottom-right: tab buttons to open each panel (+ music toggle) -->
    <div id="tab-bar">
      <button class="tab-btn music-btn" id="music-btn" title="Toggle music">🔊</button>
      <button class="tab-btn" data-tab="inventory" title="Inventory">🎒</button>
      <button class="tab-btn" data-tab="skills" title="Skills">📊</button>
      <button class="tab-btn" data-tab="equipment" title="Equipment">🛡️</button>
    </div>

    <!-- Bottom-center: action / hint text -->
    <div id="action-text"></div>

    <!-- Top-center: target / status readout -->
    <div id="target-readout"></div>

    <!-- Top-center: global level-up announcements -->
    <div id="announce-layer"></div>

    <!-- Bottom-left: controls hint -->
    <div id="controls-hint">
      <b>Left-click</b> move / interact &nbsp;•&nbsp;
      <b>WASD / Arrows</b> camera &nbsp;•&nbsp;
      <b>Q / E</b> rotate &nbsp;•&nbsp;
      <b>Wheel</b> zoom &nbsp;•&nbsp;
      <b>Shift</b> dodge roll
    </div>

    <!-- level-up toast -->
    <div id="toast-layer"></div>

    <!-- FPS counter -->
    <div id="fps-counter">-- FPS</div>
  </div>

  <!-- Death overlay -->
  <div id="death-screen">
    <div class="death-inner">
      <div class="death-title">YOU DIED</div>
      <div class="death-sub">the wasteland claims another&hellip;</div>
      <button id="respawn-btn">RESPAWN</button>
    </div>
  </div>

  <!-- Engine -->
  <script src="lib/three.min.js"></script>

  <!-- Live reload (dev only; no-op over file://) -->
  <script src="js/livereload.js"></script>

  <!-- Game modules (classic scripts, shared globals, order matters) -->
  <script src="js/utils.js"></script>
  <script src="js/world.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/player.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/net.js"></script>
  <script src="js/skills.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/mode.js"></script>
  <script src="js/selftest.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
